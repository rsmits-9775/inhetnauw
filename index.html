<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>In het NauW - Implementatie</title>
  
  <!-- 1. Laad het lettertype in de browser -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@500;700&display=swap" rel="stylesheet">
  
  <!-- 2. Laad jouw nieuwe CSS bestand -->
  <link rel="stylesheet" href="logo.css" />
</head>
<body>

  <!-- HET LOGO OP STANDAARD FORMAAT (1) -->
  <P> Normaal logo </P>
  <div class="inhaut-logo-container">
    <div class="au-anchor">
      <div class="line line-in">in</div>
      <div class="line line-het">het</div>
    </div>
    <div class="wordmark">
      <span class="big">N</span>
      <span class="small">a</span>
      <span class="small">u</span>
      <span class="big letter-w">W</span>
    </div>
  </div>

  <br><br><br>

  <!-- VOORBEELD: HET LOGO DAARONDER DIRECT KRACHTIG VERKLEINEN NAAR 30% (0.3) -->
  <P>Kleiner geschaald logo</P>
  <div class="inhaut-logo-container" style="--logo-scale: 0.3;">
    <div class="au-anchor">
      <div class="line line-in">in</div>
      <div class="line line-het">het</div>
    </div>
    <div class="wordmark">
      <span class="big">N</span>
      <span class="small">a</span>
      <span class="small">u</span>
      <span class="big letter-w">W</span>
    </div>
  </div>

</body>
</html>
